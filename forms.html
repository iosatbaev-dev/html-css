<!DOCTYPE html>
<html>

<head>
    <title>Login</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/7.0.1/css/all.min.css"
        integrity="sha512-2SwdPD6INVrV/lHTZbO2nodKhrnDdJK9/kg2XD1r9uGqPo1cUbujc+IYdlYdEErWNu69gVcYgdxlmVmzTWnetw=="
        crossorigin="anonymous" referrerpolicy="no-referrer" />

    <style>
        .inp6 {
            width: 30px;
            height: 35px;
            border: 2px solid grey;
            border-radius: 3px;
            margin-right: 10px;
        }
    </style>

</head>

<body>
    <form>
        <!--1-tapsirma-->
        <label>Login:</label><br>
        <input type="text" required> <br>
        <br>

        <label>Parol:</label><br>
        <input type="password" required>

        <button type="submit">Kiriw</button> <br>

        <hr>

        <!--2-tapsirma-->
        <h3>Hazir isleymiz yamasa oqiymiz?</h3>
        <input type="radio" name="status">
        <label>Oqiwshi</label> <br>

        <input type="radio" name="status">
        <label>Student</label> <br>

        <input type="radio" name="status">
        <label>Jumisshi</label> <br>

        <hr>

        <!--3-tapsirma-->
        <label>Atiniz:</label>
        <input type="text">

        <br> <br>

        <label>Jasiniz:</label>
        <input type="number" min="15" max="120">

        <br> <br>

        <label>Jimsiniz:</label>
        <input type="radio" name="status">Erkek
        <input type="radio" name="status">Hayal

        <br>

        <button>Dizimnen otiw</button>
        <button type="reset">Tazalaw</button>

        <hr>

        <!--4-tapsirma-->
        <h3>Qaysi tillarni bilasiz?</h3>
        <input type="checkbox">
        <label>Ozbej tili</label>

        <br>

        <input type="checkbox">
        <label>Ingliz tili</label>

        <br>

        <input type="checkbox">
        <label>Rus tili</label>

        <br> <br>

        <button type="reset">Tazalaw</button>

        <hr>

        <!--5-tapsirma-->
        <label>Sayttan izlew:</label>
        <input type="text">
        <button><i class="fa-solid fa-magnifying-glass"></i></button>

        <hr>

        <!--6-tapsirma-->

        <h3>Gmail manzilinizge jiberilge 6 xanali kodti kiritiniz:</h3>

        <input type="text" class="inp6">
        <input type="text" class="inp6">
        <input type="text" class="inp6">
        <input type="text" class="inp6">

        <hr>

        <!--7-tapsirma-->

        <p>Uy tapsirmasin (fayldi) tanlan:</p>
        <input type="file">
        <p><i>Esletpe: Fayl tanlaw majburiy!</i></p>
        
        <br> <br> <br>

        <!-- FORM PORT-II  -->
        <hr>
        
        <!-- II 1-tapsirma -->
        <input type="text" placeholder="Name">
        <br> <br>
        <input type="email" placeholder="Email">

    </form>
</body>

</html>
